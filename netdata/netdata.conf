[global]
    # Nome do servidor no painel
    hostname = meu-servidor

    # Histórico mínimo para manter leveza (1 hora)
    history = 3600

    # Intervalo de coleta em segundos
    update every = 1

    # Desativa telemetria/Cloud
    telemetry enabled = no

[plugins]
    # Mantém apenas plugins essenciais
    proc                = yes
    diskspace           = yes
    cgroups             = yes
    python.d            = no
    node.d              = no
    charts.d            = no
    nfacct              = no
    fping               = no

[plugin:cgroups]
    # Habilita monitoramento de containers Docker
    enable cpuacct                      = yes
    enable memory                       = yes
    enable blkio                        = yes
    enable cpuset                       = yes
    run script to rename cgroups matching = yes
    search for cgroups in subpaths matching = *docker*

[web]
    # Aceita conexões somente do Nginx (dentro da rede Docker)
    allow connections from = localhost 127.0.0.1 ::1 monitoring-nginx netdata nginx
    allow dashboard from = *
    allow badges from = *
    allow streaming from = *

[logs]
    # Reduz verbosidade dos logs
    error log = /var/log/netdata/error.log
    debug log = /dev/null
    access log = /dev/null
