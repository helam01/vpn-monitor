# ─────────────────────────────────────────────
# ALERTAS — Limiar de 90% para todos os recursos
# ─────────────────────────────────────────────

# CPU do servidor > 90%
alarm: cpu_usage_high
    on: system.cpu
    lookup: average -3m unaligned of user,system,softirq,irq,guest
    units: %
    every: 1m
    warn: $this > 80
    crit: $this > 90
    info: Uso de CPU do servidor está elevado
    to: sysadmin

# RAM disponível < 10% (equivale a uso > 90%)
alarm: ram_usage_high
    on: system.ram
    lookup: average -1m unaligned of used
    units: MiB
    every: 1m
    warn: ($this / ($system.ram.used + $system.ram.free + $system.ram.cached + $system.ram.buffers)) * 100 > 80
    crit: ($this / ($system.ram.used + $system.ram.free + $system.ram.cached + $system.ram.buffers)) * 100 > 90
    info: Uso de RAM do servidor está elevado
    to: sysadmin

# Disco > 90% de uso
alarm: disk_usage_high
    on: disk.space
    lookup: average -1m unaligned of used
    units: %
    every: 1m
    warn: $this > 80
    crit: $this > 90
    info: Uso de disco está elevado
    to: sysadmin

# Recebimento de rede > 900 Mbps (90% de 1Gbps)
alarm: net_inbound_high
    on: system.net
    lookup: average -1m unaligned of received
    units: kilobits/s
    every: 1m
    warn: $this > 700000
    crit: $this > 900000
    info: Alto tráfego de entrada na rede
    to: sysadmin

# Envio de rede > 900 Mbps
alarm: net_outbound_high
    on: system.net
    lookup: average -1m unaligned of sent
    units: kilobits/s
    every: 1m
    warn: $this > 700000
    crit: $this > 900000
    info: Alto tráfego de saída na rede
    to: sysadmin
