services:

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    hostname: meu-servidor
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./netdata/netdata.conf:/etc/netdata/netdata.conf:ro
      - ./netdata/health.d/alerts.conf:/etc/netdata/health.d/alerts.conf:ro
      - ./netdata-notifications/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf:ro
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
    environment:
      - NETDATA_CLAIM_TOKEN=
      - NETDATA_CLAIM_URL=
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - monitoring

  nginx:
    image: nginx:alpine
    container_name: monitoring-nginx
    restart: unless-stopped
    ports:
      - "3055:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - netdata
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:
